name: build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  colcon-build:
    name: Build and Test (${{ matrix.ros_distro }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            container_tag: humble
          - ros_distro: iron
            container_tag: iron
          - ros_distro: jazzy
            container_tag: jazzy
    container:
      image: ghcr.io/dskkato/ros2-cuda-ipc-dev:${{ matrix.container_tag }}
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build workspace
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon build \
            --symlink-install \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Run tests
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon test \
            --event-handlers console_direct+ \
            --packages-skip example_type_adapters julia_set_original simple_increment

      - name: Check test results
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon test-result --verbose

      - name: Upload test logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: colcon-test-logs
          path: log/latest_test
          if-no-files-found: ignore
