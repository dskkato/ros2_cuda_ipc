name: build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  colcon-build:
    name: Build and Test (${{ matrix.ros_distro }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            container_tag: humble
          - ros_distro: iron
            container_tag: iron
          - ros_distro: jazzy
            container_tag: jazzy
    container:
      image: ghcr.io/dskkato/ros2-cuda-ipc-dev:${{ matrix.container_tag }}
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build workspace
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon build \
            --symlink-install \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Detect CUDA availability
        id: cuda-check
        run: |
          set -eo pipefail
          if command -v nvidia-smi >/dev/null 2>&1; then
            echo "cuda=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -e /proc/driver/nvidia/version ] || [ -d /dev/nvidia0 ]; then
            echo "cuda=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "CUDA devices not detected; tests will be skipped." >&2
          echo "cuda=false" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        if: steps.cuda-check.outputs.cuda == 'true'
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon test \
            --event-handlers console_direct+ \
            --packages-skip example_type_adapters julia_set_original simple_increment

      - name: Check test results
        if: steps.cuda-check.outputs.cuda == 'true'
        run: |
          set -eo pipefail
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          colcon test-result --verbose

      - name: Skip tests (no CUDA detected)
        if: steps.cuda-check.outputs.cuda != 'true'
        run: |
          echo "Skipping colcon test because CUDA is unavailable on this runner."

      - name: Upload test logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: colcon-test-logs
          path: log/latest_test
          if-no-files-found: ignore
